<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
    
</head>
<body>

    <main>
        <header class="navbar">
            <span id="userDisplay">User</span>
            <button id="logoutBtn">Logout</button>
        </header>
        <nav class="sidebar">
         
        <div class="logo">
            <img src = "./logo-removebg-preview.png"/>
            <h1 id="fin">FinTrack </h1>
            <!-- <span>Enterprise Finance</span> -->
        </div>

        <div class="sidebar-bottom">
            <button id="form-open">➕Add Transaction</button>
            <div class="modal hidden">
                <div class="box">
                    <h2>Add Transaction</h2>
                    <form id="transactionForm">
                        <label>Title</label>
                        <input type="type" id="title" >
                        <label> Amount</label>
                        <input type="number" id="amount">
                        <label>Category</label>
                        <select id="category">
                            <option>Salary</option>
                            <option>Shopping</option>
                            <option>Food</option>
                            <option>Travel</option>
                            <option>Bills</option>
                            <option>Other</option>
                        </select>
                        <label>Type</label>
                        <div class="type">
                            <label>
                                <input type="radio" name="type" value="Income">
                                Income
                            </label>

                            <label>
                                <input type="radio" name="type" value="Expense">
                                Expense
                            </label>
                        </div>

                        <div class="buttons">
                            <button type="button" id="cancelBtn">
                                Cancel
                            </button>
                            <button type="submit" id="submitBtn">
                                Save
                            </button>

                        </div>
                    </form>
                </div>
            </div>
        </div>

        </nav>
<!-- Content middle part  -->
        <div class="content">
            <div class="content-head">
                <h1 id="top">Financial Overview</h1>
                <span id="top">Real-time tracking application</span>
            </div>
            <div class="row">
                <div class="card">
                    <img src="./bank_PNG3-removebg-preview.png" />
                    <span>Current Balance</span>
                    <h2 id="balance">$0</h2>
                 </div>
                 <div class="card">
                    <img src="./bank_PNG3-removebg-preview.png" />
                    <span>Total Income</span>
                    <h2 id="income">$0</h2>
                 </div>
                 <div class="card">
                    <img src="./bank_PNG3-removebg-preview.png" />
                    <span>Total expense</span>
                    <h2 id="expense">$0</h2>
                 </div>
                 <div class="card">
                    <img src="./bank_PNG3-removebg-preview.png" />
                    <span>Total Transactions</span>
                    <h2 id="transactionCount">0</h2>
                 </div>
            </div>

             <!-- Middle section yha se suru ha -->
            <section class="middle-section">

                 <div class="graph">
                    <h2>Cash Flow Analysis</h2>
                    <div class="graph-box">
                        <canvas id="chart"></canvas>
                    </div>
                </div>

                
                <div class="preference">
                    <h2>Preferences</h2>
                    <div class="dark-mode">
                        <span>Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>

                    <button class="reset">
                        🗑 Reset All Data
                    </button>
                </div>

            </section>

            <section class="transaction-section">
                <h2>All Transactions</h2>
                <div class="transaction-top">
                    <div class="search-box">
                        <input
                            type="text"
                            placeholder="Search transactions..."
                            id="search"
                        >
                    </div>
                    <div class="filter">
                        <select id="filter">
                            <option>All Types</option>
                            <option>Income</option>
                            <option>Expense</option>
                        </select>
                    </div>
                </div>

 
                <div class="table-heading">
                    <span>DATE</span>
                    <span>DESCRIPTION</span>
                    <span>CATEGORY</span>
                    <span>AMOUNT</span>
                    <span>ACTIONS</span>

                </div>

                <div id="transactionList">
                </div>
            </section>

         </div>
          

    </main>

    

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      
    <script src="dashboard.js"></script>

</body>
</html>
